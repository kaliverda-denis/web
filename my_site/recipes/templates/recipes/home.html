<h1>Рецепти</h1>
<a href="{% url 'add_recipe' %}">Додати рецепт</a>
<ul>
{% for recipe in recipes %}
    <li>
        <strong>{{ recipe.name }}</strong>: {{ recipe.ingredients }}
        [<a href="{% url 'edit_recipe' recipe.pk %}">Редагувати</a>]
        [<a href="{% url 'delete_recipe' recipe.pk %}">Видалити</a>]
    </li>
{% empty %}
    <li>Рецептів поки немає.</li>
{% endfor %}
</ul>
