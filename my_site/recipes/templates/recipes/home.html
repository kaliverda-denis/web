<h1>Рецепты</h1>
<a href="{% url 'add_recipe' %}">Добавить рецепт</a>
<ul>
{% for recipe in recipes %}
    <li>
        <strong>{{ recipe.name }}</strong>: {{ recipe.ingredients }}
        [<a href="{% url 'edit_recipe' recipe.pk %}">Редактировать</a>]
        [<a href="{% url 'delete_recipe' recipe.pk %}">Удалить</a>]
    </li>
{% empty %}
    <li>Рецептов пока нет.</li>
{% endfor %}
</ul>
