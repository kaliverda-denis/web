{% extends 'departments/base.html' %}

{% block content %}

<h2>Курси</h2>
<ul>
{% for dept in departments %}
    <li>{{ dept.name }}</li>
{% endfor %}
</ul>

<h2>Інструктори</h2>
<ul>
{% for inst in instructors %}
    <li>
        {{ inst.user.username }} ({{ inst.department.name }})
    </li>
{% endfor %}
</ul>

{% endblock %}
